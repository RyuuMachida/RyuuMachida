<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Modern</title>
  <link rel="stylesheet" href="style.css" />
      <div class="modern-stack">
      <h3>Data Diri Ariel</h3>
      <ul>
        <li><strong>Nama:</strong> Ariel</li>
        <li><strong>Usia:</strong> 15 tahun</li>
        <li><strong>Hobi:</strong> Ngedit, Berita Bola</li>
        <li><strong>Tujuan:</strong> Kuliah IT dan Magang ke Jepang</li>
        <button id="showMoreBtn">Tampilkan Info Lain</button>
      </ul>
      <div id="more-info" class="hidden">
        <p><strong>Jurusan:</strong> RPL</p>
        <p><strong>Ekstrakurikuler:</strong> Bahasa Jepang</p>
        <p><strong>Rencana Karier:</strong> Web Developer, Full Stack</p>
      </div>
    
</head>
<body>
  <div class="login-container">
   <audio id="bg-music" loop>
     <source src="bg-music.mp3" type="audio/mpeg">
   </audio> 
   <button id="music-toggle" class="music-btn" title="Toggle Music">▶</button>
    <h2>Login</h2>
    <form id="loginForm">
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" required />
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" required />
      </div>
      <div class="checkbox-container">
         <input type="checkbox" id="privacy" name="privacy">
         <label for="privacy">Saya menyetujui kebijakan privasi</label>
      </div>
      <button type="submit">Masuk</button>
      <p id="message"></p>
      <div>
        <span id="clicktest" class="site-ujian">Ujian Sekolah</span>
      </div>
      <br>
    </form>
    
  </div>

  <script src="script.js"></script>
</body>
</html>
